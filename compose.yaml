name: mailassistant

services:
  postgres:
    image: postgres:16.8-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mailassistant}
      POSTGRES_USER: ${POSTGRES_USER:-mailassistant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-development-only}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-mailassistant} -d ${POSTGRES_DB:-mailassistant}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4.0.7-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-mailassistant}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-local-development-only}
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.4
    command:
      - start-dev
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-local-development-only}
      KC_HEALTH_ENABLED: "true"
    ports:
      - "${KEYCLOAK_HTTP_PORT:-8080}:8080"
    volumes:
      - ./infrastructure/keycloak/realm-mailassistant.json:/opt/keycloak/data/import/realm-mailassistant.json:ro
      - keycloak-data:/opt/keycloak/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/127.0.0.1/9000 && printf 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: src/MailAssistant.Api/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Database: Host=postgres;Port=5432;Database=${POSTGRES_DB:-mailassistant};Username=${POSTGRES_USER:-mailassistant};Password=${POSTGRES_PASSWORD:-local-development-only}
      Authentication__Authority: http://keycloak:8080/realms/mailassistant
      Authentication__Audience: mailassistant-api
      Authentication__ValidIssuers__0: http://localhost:8080/realms/mailassistant
      Authentication__ValidIssuers__1: http://127.0.0.1:8080/realms/mailassistant
      Authentication__RequireHttpsMetadata: "false"
      Frontend__Origins__0: http://localhost:5173
      Frontend__Origins__1: http://127.0.0.1:5173
    ports:
      - "${API_PORT:-5080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: src/MailAssistant.Worker/Dockerfile
    environment:
      ConnectionStrings__Database: Host=postgres;Port=5432;Database=${POSTGRES_DB:-mailassistant};Username=${POSTGRES_USER:-mailassistant};Password=${POSTGRES_PASSWORD:-local-development-only}
    depends_on:
      api:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      api:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  rabbitmq-data:
  keycloak-data:
