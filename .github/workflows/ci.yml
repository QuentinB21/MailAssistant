name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm run verify

  database-migration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.8-alpine
        env:
          POSTGRES_DB: mailassistant
          POSTGRES_USER: mailassistant
          POSTGRES_PASSWORD: local-development-only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mailassistant -d mailassistant"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - run: dotnet tool restore
      - run: dotnet build MailAssistant.sln --configuration Release
      - run: dotnet ef database update --no-build --configuration Release --project src/MailAssistant.Infrastructure --startup-project src/MailAssistant.Api
