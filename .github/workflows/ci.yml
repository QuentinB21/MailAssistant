name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.8-alpine
        env:
          POSTGRES_DB: mailassistant
          POSTGRES_USER: mailassistant
          POSTGRES_PASSWORD: local-development-only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mailassistant -d mailassistant"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - run: dotnet restore MailAssistant.sln
      - run: dotnet build MailAssistant.sln --no-restore --configuration Release
      - run: dotnet test MailAssistant.sln --no-build --configuration Release
      - run: dotnet tool restore
      - run: dotnet ef migrations has-pending-model-changes --no-build --configuration Release --project src/MailAssistant.Infrastructure --startup-project src/MailAssistant.Api
      - run: dotnet ef database update --no-build --configuration Release --project src/MailAssistant.Infrastructure --startup-project src/MailAssistant.Api

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  infrastructure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet
